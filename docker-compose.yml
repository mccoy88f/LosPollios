# Stack per Portainer: Stacks → Add stack → incolla questo file.
# Imposta JWT_SECRET (obbligatorio in produzione) nelle variabili d'ambiente dello stack.

services:
  lospollios:
    build:
      context: .
      dockerfile: Dockerfile
    image: lospollios:latest
    restart: unless-stopped
    ports:
      # porta esterna standard 3522 → app in ascolto su 3000 nel container
      - "3522:3000"
    environment:
      NODE_ENV: production
      # Database reale fornito dall'ambiente (obbligatorio)
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
